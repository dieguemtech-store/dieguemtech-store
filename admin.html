<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin - DieguemTech Store</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="shortcut icon" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell">
    <section class="login-card" id="loginCard">
      <div class="brand"><img class="brand-logo" src="/assets/logo.svg" alt="DieguemTech Store" width="220" height="56"></div>
      <h1>Connexion admin</h1>
      <p>Entrez le mot de passe admin configure dans Render.</p>
      <form id="loginForm">
        <label>Mot de passe
          <input type="password" id="adminPassword" placeholder="ADMIN_PASSWORD" autocomplete="current-password" required>
        </label>
        <button type="submit">Se connecter</button>
      </form>
      <p class="message" id="loginMessage"></p>
    </section>

    <section class="dashboard" id="dashboard" hidden>
      <header class="dashboard-header">
        <div>
          <span class="eyebrow">Tableau admin</span>
          <h1>Commandes DieguemTech</h1>
        </div>
        <div class="header-actions">
          <button id="exportOrders" class="ghost">Exporter CSV</button>
          <button id="refreshOrders">Actualiser</button>
          <button id="logoutButton" class="ghost">Deconnexion</button>
        </div>
      </header>

      <div class="admin-tabs">
        <button class="active" data-admin-tab="orders">Commandes</button>
        <button data-admin-tab="products">Produits</button>
      </div>

      <section id="ordersPanel">
        <div class="stats-grid">
          <article><span>Total commandes</span><strong id="totalOrders">0</strong></article>
          <article><span>Aujourd'hui</span><strong id="todayOrders">0</strong><small id="todayRevenue">0 FCFA encaisses</small></article>
          <article><span>En attente</span><strong id="pendingOrders">0</strong></article>
          <article><span>A preparer</span><strong id="toPrepareOrders">0</strong></article>
          <article><span>Payees</span><strong id="paidOrders">0</strong></article>
          <article><span>Livrees</span><strong id="deliveredOrders">0</strong></article>
          <article><span>Panier moyen</span><strong id="averageBasket">0 FCFA</strong></article>
          <article><span>Chiffre d'affaires</span><strong id="totalRevenue">0 FCFA</strong></article>
        </div>

        <div class="toolbar">
          <input type="search" id="orderSearch" placeholder="Rechercher client, telephone, commande...">
          <select id="statusFilter">
            <option value="">Tous les statuts</option>
            <option value="pending">En attente</option>
            <option value="paid">Payee</option>
            <option value="preparing">En preparation</option>
            <option value="shipped">Expediee</option>
            <option value="delivered">Livree</option>
            <option value="cancelled">Annulee</option>
          </select>
          <select id="paymentFilter">
            <option value="">Tous paiements</option>
            <option value="pending">Paiement en attente</option>
            <option value="paid">Paiement paye</option>
            <option value="failed">Paiement echoue</option>
            <option value="refunded">Rembourse</option>
          </select>
          <select id="dateFilter">
            <option value="">Toutes les dates</option>
            <option value="today">Aujourd'hui</option>
            <option value="7d">7 derniers jours</option>
            <option value="30d">30 derniers jours</option>
          </select>
        </div>
        <p class="toolbar-summary" id="ordersFilterSummary"></p>

        <div class="orders-list" id="ordersList"></div>
        <p class="empty" id="emptyOrders" hidden>Aucune commande trouvee.</p>
      </section>

      <section id="productsPanel" hidden>
        <div class="toolbar product-toolbar">
          <input type="search" id="productSearch" placeholder="Rechercher produit, categorie, sous-categorie...">
          <select id="productCategoryFilter">
            <option value="">Toutes categories</option>
          </select>
          <select id="productStatusFilter">
            <option value="">Tous statuts</option>
            <option value="published">Publies</option>
            <option value="hidden">Masques</option>
          </select>
          <select id="productFeaturedFilter">
            <option value="">Tous produits</option>
            <option value="featured">Mis en avant</option>
            <option value="normal">Non mis en avant</option>
          </select>
          <button type="button" id="addProductButton">Ajouter un produit</button>
        </div>
        <div class="products-admin-list" id="productsAdminList"></div>
        <p class="empty" id="emptyProducts" hidden>Aucun produit trouve.</p>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="orderModal" hidden>
    <section class="order-modal">
      <button class="modal-close" id="closeOrderModal" aria-label="Fermer">&times;</button>
      <div id="orderModalContent"></div>
    </section>
  </div>
  <div class="modal-backdrop" id="productModal" hidden>
    <section class="order-modal product-edit-modal">
      <button class="modal-close" id="closeProductModal" aria-label="Fermer">&times;</button>
      <form id="productForm"></form>
    </section>
  </div>
  <script src="admin.js"></script>
</body>
</html>
