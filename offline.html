<!doctype html>
<html lang="fr-SN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#f68b1e">
  <title>Hors ligne - DieguemTech Store</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    :root{--orange:#f68b1e;--charcoal:#313133;--muted:#6d6d6d}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#fff8ef,#f7f7f7);font-family:Arial,sans-serif;color:var(--charcoal);padding:24px}
    main{width:min(520px,100%);background:#fff;border:1px solid #eee;border-radius:24px;padding:34px;box-shadow:0 20px 55px rgba(0,0,0,.08);text-align:center}
    img{width:210px;max-width:100%;height:auto;margin-bottom:18px}
    .mark{width:64px;height:64px;border-radius:18px;background:var(--orange);color:#fff;display:grid;place-items:center;margin:0 auto 18px;font-size:28px;font-weight:900}
    h1{font-size:30px;line-height:1.1;margin:0 0 12px}
    p{color:var(--muted);line-height:1.7;margin:0 0 22px}
    .actions{display:grid;gap:10px}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:10px;padding:13px 16px;font-weight:800;text-decoration:none}
    .primary{background:var(--orange);color:#fff}
    .outline{border:1px solid #ddd;color:var(--charcoal);background:#fff}
  </style>
</head>
<body>
  <main>
    <img src="/assets/logo.svg" alt="DieguemTech Store">
    <div class="mark">!</div>
    <h1>Vous etes hors ligne</h1>
    <p>La boutique a besoin d'une connexion pour charger le catalogue, le panier et le suivi de commande. Reessayez quand Internet revient.</p>
    <div class="actions">
      <a class="primary" href="/">Reessayer</a>
      <a class="outline" href="https://wa.me/221772177176">Contacter WhatsApp</a>
    </div>
  </main>
</body>
</html>
